<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - NOC PT Nada Freedom Indonesia</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ketupat {
            position: absolute;
            width: clamp(50px, 15vw, 100px);
            opacity: 0.25;
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.4));
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(5deg);
            }

            50% {
                transform: translateY(-30px) rotate(-5deg);
            }
        }

        .card {
            position: relative;
            z-index: 10;
            width: 85%;
            max-width: 500px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .terminal-header {
            background: rgba(30, 41, 59, 0.8);
            padding: 10px 15px;
            display: flex;
            gap: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .red {
            background: #ff5f56;
        }

        .yellow {
            background: #ffbd2e;
        }

        .green {
            background: #27c93f;
        }

        .content {
            padding: 30px;
            color: #f8fafc;
            text-align: left;
        }

        h1 {
            font-size: 24px;
            color: #22c55e;
            margin: 0 0 20px 0;
            text-align: center;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        /* Typing Effect Area */
        #pantun-text {
            font-size: 15px;
            line-height: 1.8;
            color: #cbd5e1;
            min-height: 120px;
            margin-bottom: 20px;
            border-left: 2px solid #22c55e;
            padding-left: 15px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #22c55e;
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .footer {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
            font-size: 11px;
            color: #64748b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer b {
            color: #22c55e;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            #pantun-text {
                font-size: 13px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <canvas id="fireworksCanvas"></canvas>

    <img src="https://cdn-icons-png.flaticon.com/512/3233/3233303.png" class="ketupat" style="top: 5%; left: 5%;">
    <img src="https://cdn-icons-png.flaticon.com/512/3233/3233303.png" class="ketupat"
        style="bottom: 10%; right: 5%; width: 60px; animation-delay: 2s;">

    <div class="card">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="content">
            <h1>EID MUBARAK 1447H</h1>

            <div id="pantun-text"></div>

            <div style="font-size: 12px; color: #4ade80; margin-top: 10px;">
                > System status: Heart fully restored.<br>
                > Log: Mohon maaf lahir dan batin.
            </div>
        </div>
        <div class="footer">
            <b>PT NADA FREEDOM INDONESIA</b><br>
            <i>NOC Team: Monitoring Hearts, Connecting Souls</i>
        </div>
    </div>

    <script>
        // --- Typing Effect ---
        const text = `Pergi ke server membawa tang,
Fiber optik putus di tengah jalan.
Malam takbir sudah berkumandang,
Khilaf dan salah mohon dimaafkan.

Routing hati ke arah yang fitri,
Bandwidth maaf dibuka selebar hari.`;

        let i = 0;
        const speed = 50;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("pantun-text").innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                i++;
                setTimeout(typeWriter, speed);
            } else {
                document.querySelector(".cursor").style.display = 'none';
            }
        }

        // --- Fireworks Logic ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 6, y: (Math.random() - 0.5) * 6 };
                this.alpha = 1;
                this.friction = 0.96;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.012;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(2, 6, 23, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                if (p.alpha > 0) { p.update(); p.draw(); }
                else { particles.splice(index, 1); }
            });
            if (Math.random() < 0.04) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.6);
                const color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                for (let i = 0; i < 40; i++) particles.push(new Particle(x, y, color));
            }
        }

        // Start animations
        animate();
        setTimeout(typeWriter, 1000); // Start typing after 1s
    </script>
</body>

</html>
